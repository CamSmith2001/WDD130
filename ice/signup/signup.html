<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            background-color: white;
            width: 395px;
            height: 564px;
            border: 10px solid navy;
            border-radius: 5%;
        }

        #title {
            background-image: url("./images/jesus_feeds_5000.jpeg");
            background-size: 400px;
            width: 100%;
            height: 100%;
            border: 10px;
            border-radius: 2%;
        }

        #title h1 {
            color: white;
            font-family: 'Verdana', 'Geneva', 'Tahoma', 'sans-serif';
            text-align: center;
            padding-top: 70px;
            
        }

        #title h2 {
            color: white;
            font-family: 'Verdana', 'Geneva', 'Tahoma', 'sans-serif';
            text-align: center;
        }

        #main {
            background-color: white;
            position: absolute;
            top: 160px;
            width: 395px;
            height: 413px;
            border: 10px;
            border-bottom-left-radius: 2%;
            border-bottom-right-radius: 2%;
        }

        #main h3 {
            text-align: center;
        }

        #closeBtn {
            background-color: white;
            position: absolute;
            top: -145px;
            left: 5px;
            border: 10px;
            border-radius: 5%;
        }

        #myForm {
            display: grid;
            grid-template-columns: repeat(1fr, 3);
            grid-template-rows: repeat(1fr, 7);
            padding-left: 20px;
            padding-right: 20px;
        }

        label, .username, .password, .email{
            grid-column: 1/2;
            padding: 10px;
        }

        input, .username, .password, .email {
            grid-column: 2/3;
            margin: 10px;
        }

        #submit {
            background-color: white;
            margin-top: 10px;
            margin-left: 150px;
            margin-right: -40px;
            border: 10px;
            border-radius: 5%;
            outline-style: solid;
            outline-width: 1px;
            outline-color: black;
        }
        
        .books {
            display: grid;
            grid-template-columns: repeat(1fr, 7);
        }

        .books img{
            width: 90%;
            height: 90%;
            margin-top: 25px;
        }

        .new {
            grid-column: 1;
            border: 10px;
            border-bottom-left-radius: 10%;
        }

        .old {
            grid-column: 2;
        }

        .bom {
            grid-column: 3;
        }

        .dc {
            grid-column: 4;
        }

        .pogp {
            grid-column: 5;
            border: 10px;
            border-bottom-right-radius: 10%;
        }
        
        
        

    </style>




</head>

<body>
    <div id="formContainer">
        <div id="title">
            <h1> Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <div id="main">
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit" id="submit">Submit</button>
            </section>
        </form>

            <div class="books">
            <img class="new" src="images/new_testament.webp" alt="New Testament">
            <img class="old" src="images/old_testament.webp" alt="Old Testament">
            <img class="bom" src="images/book_of_mormon.webp" alt="Book of Mormon">
            <img class="dc" src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
            <img class="pogp" src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
            </div>

        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
