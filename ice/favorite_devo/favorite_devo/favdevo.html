<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table>
            <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
            <tr>
              <td>Dallin H. Oaks</td>
              <td>Coming Closer to Jesus Christ</td>
              <td>BYU-Provo</td>
              <td>2026</td>
            </tr>
            <tr>
              <td>David A. Bednar</td>
              <td>Quick to Observe</td>
              <td>BYU-Provo</td>
              <td>2005</td>
            </tr>
            <tr>
              <td>Jeffrey R. Holland</td>
              <td>Cast Not Away Therefore Your Confidence</td>
              <td>BYU-Provo</td>
              <td>1999</td>
            </tr>
         </table>
         <form action="">
          <label for="Speaker">Speaker</label>
          <input type="text">

          <label for="Title">Title</label>
          <input type="text">

          <label for="Location">Location</label>
          <input type="text">

          <label for="Year">Year</label>
          <input type="number">

          <input type="submit">
         </form>
      </div>
    </main>
  </div>
</body>
</html>
